name: Build and Push Docker Image

# Run this workflow every time code is pushed to the main branch
on:
  push:
    branches: [main]

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Download the code from the repository onto the runner
      - name: Checkout code
        uses: actions/checkout@v4

      # Step 2: Log in to GCP using the service account key stored in GitHub Secrets
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      # Step 3: Log Docker in to Google Artifact Registry using the official Docker action
      # This replaces the raw gcloud shell command — not affected by CRLF line ending issues
      - name: Log in to Artifact Registry
        uses: docker/login-action@v3
        with:
          registry: us-central1-docker.pkg.dev
          username: _json_key
          password: ${{ secrets.GCP_SA_KEY }}

      # Step 4: Build the image and push it to Artifact Registry using the official Docker action
      # Using an Action instead of shell commands avoids Windows CRLF line ending issues
      # Tags: 'latest' for convenience, commit SHA for traceability
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            us-central1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/tlvflow/tlvflow:latest
            us-central1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/tlvflow/tlvflow:${{ github.sha }}
