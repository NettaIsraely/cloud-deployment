name: Build and Push Docker Image

# Run this workflow every time code is pushed to the main branch
on:
  push:
    branches: [main]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
  
    env:
      SERVICE_NAME: tlvflow-service
      REGION: us-central1

    steps:
      # Step 1: Download the code from the repository onto the runner
      - name: Checkout code
        uses: actions/checkout@v4

      # Step 2: Log in to GCP using the service account key we stored in GitHub Secrets
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      # Step 3: Configure Docker so it knows how to push to Google Artifact Registry
      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker us-central1-docker.pkg.dev --quiet

      # Step 4: Build and push the Docker image to Artifact Registry
      # IMAGE env var stores the full registry path to avoid repeating it
      # We tag with 'latest' and the commit SHA so you can trace exactly which code produced each image
      - name: Build and push Docker image
        env:
          PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
        run: |
          PROJECT_ID_CLEAN="$(printf '%s' "${PROJECT_ID}" | tr -d '\r\n')"
          if [ -z "${PROJECT_ID_CLEAN}" ]; then
            echo "GCP_PROJECT_ID secret is empty"
            exit 1
          fi

          IMAGE="us-central1-docker.pkg.dev/${PROJECT_ID_CLEAN}/tlvflow/tlvflow"
          IMAGE_CLEAN="$(printf '%s' "${IMAGE}" | tr -d '\r\n')"
          GITHUB_SHA_CLEAN="$(printf '%s' "${GITHUB_SHA}" | tr -d '\r\n')"

          IMAGE_LATEST="${IMAGE_CLEAN}:latest"
          IMAGE_SHA="${IMAGE_CLEAN}:${GITHUB_SHA_CLEAN}"
          BUILD_CONTEXT="${GITHUB_WORKSPACE:-.}"

          docker build --tag "${IMAGE_LATEST}" --tag "${IMAGE_SHA}" "${BUILD_CONTEXT}"
          docker push "${IMAGE_LATEST}"
          docker push "${IMAGE_SHA}"

      - name: Deploy to Cloud Run
        env:
          PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
        run: |
          gcloud run deploy $SERVICE_NAME \
            --image us-central1-docker.pkg.dev/${PROJECT_ID}/tlvflow/tlvflow:latest \
            --region $REGION \
            --platform managed \
            --allow-unauthenticated
